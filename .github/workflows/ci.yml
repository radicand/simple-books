name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ci-test-secret-not-for-production-use-only-32chars
      DATABASE_URL: ./data/simple-books.db
      ALLOW_PUBLIC_SIGNUP: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Production build
        run: bun run build

      - name: Helm lint
        run: |
          helm lint deploy/helm/simple-books
          helm template test deploy/helm/simple-books \
            --set secretEnv.BETTER_AUTH_SECRET=ci \
            --set secretEnv.BETTER_AUTH_URL=http://localhost:3000 \
            > /dev/null

      - name: Docker build
        run: docker build -t simple-books:ci .

      - name: Install Playwright
        run: bunx playwright install chromium --with-deps

      - name: Smoke tests
        run: |
          bun run db:reset
          bun run start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:3000/api/health
          bunx playwright test
