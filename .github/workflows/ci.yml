name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ci-test-secret-not-for-production-use-only-32chars
      DATABASE_URL: ./data/simple-books.db
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bun test src/lib/attachment-security.test.ts

      - name: Auth middleware invariant
        run: |
          failed=0
          while IFS= read -r f; do
            if ! rg -q 'requireAuthMiddleware|sessionMiddleware' "$f"; then
              echo "Missing auth middleware: $f"
              failed=1
            fi
          done < <(rg -l 'createServerFn' src --glob '*.ts' | rg -v 'auth\.functions\.ts')
          exit "$failed"

      - name: Production build
        run: bun run build

      - name: Helm lint
        run: |
          helm lint deploy/helm/simple-books
          helm template test deploy/helm/simple-books \
            --set secretEnv.BETTER_AUTH_SECRET=ci \
            --set secretEnv.BETTER_AUTH_URL=http://localhost:3000 \
            > /dev/null

      - name: Docker build
        run: docker build -t simple-books:ci .

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium --with-deps

      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Smoke tests
        run: bash scripts/e2e.sh --skip-build
