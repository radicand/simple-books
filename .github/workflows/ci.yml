name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Playwright container tags must match @playwright/test major.minor (see package.json).
  resolve-playwright:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pw.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: pw
        name: Read @playwright/test version
        run: |
          v=$(node -p "require('./package.json').devDependencies['@playwright/test'].replace(/^[^0-9]+/, '')")
          echo "version=$v" >> "$GITHUB_OUTPUT"

  verify:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      BETTER_AUTH_SECRET: ci-test-secret-not-for-production-use-only-32chars
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bun test src/lib/attachment-security.test.ts

      - name: Auth middleware invariant
        run: |
          failed=0
          while IFS= read -r f; do
            if ! rg -q 'requireAuthMiddleware|sessionMiddleware' "$f"; then
              echo "Missing auth middleware: $f"
              failed=1
            fi
          done < <(rg -l 'createServerFn' src --glob '*.ts' | rg -v 'auth\.functions\.ts')
          exit "$failed"

      - name: Production build
        run: bun run build

      - name: Upload production build for smoke tests
        uses: actions/upload-artifact@v7
        with:
          name: app-output
          path: .output
          retention-days: 1

      - name: Helm lint
        run: |
          helm dependency update deploy/helm/simple-books
          helm lint deploy/helm/simple-books
          helm template test deploy/helm/simple-books \
            --set secretEnv.BETTER_AUTH_SECRET=ci \
            --set secretEnv.BETTER_AUTH_URL=http://localhost:3000 \
            > /dev/null
          helm template test-pg deploy/helm/simple-books \
            --set postgresql.enabled=true \
            --set secretEnv.BETTER_AUTH_SECRET=ci \
            --set secretEnv.BETTER_AUTH_URL=http://localhost:3000 \
            > /dev/null
          helm template test-pg-ext deploy/helm/simple-books \
            --set database.externalUrl=postgresql://u:p@db.example:5432/simplebooks \
            --set secretEnv.BETTER_AUTH_SECRET=ci \
            --set secretEnv.BETTER_AUTH_URL=http://localhost:3000 \
            > /dev/null
          helm template test-pg-secret deploy/helm/simple-books \
            --set database.existingSecretName=db-credentials \
            --set secretEnv.BETTER_AUTH_SECRET=ci \
            --set secretEnv.BETTER_AUTH_URL=http://localhost:3000 \
            > /dev/null

      - name: Docker build
        run: docker build -t simple-books:ci .

  smoke:
    needs: [verify, resolve-playwright]
    runs-on: ubuntu-latest
    # Official image: browsers + OS libs (fonts, codecs) pre-installed — no install-deps/apt.
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.resolve-playwright.outputs.version }}-noble
      options: --user 1001
    env:
      CI: true
      NODE_ENV: production
      BETTER_AUTH_SECRET: ci-test-secret-not-for-production-use-only-32chars
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Cache Bun install (container)
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-pw-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-pw-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: E2E production build
        run: bun run build:e2e

      - name: Smoke tests
        env:
          PLAYWRIGHT_USE_PROD: '1'
        run: bun run test
