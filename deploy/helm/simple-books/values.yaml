# Default values for simple-books.
# See values.schema.json for field documentation and validation.

# SQLite (default): keep at 1 — single-writer file DB. With postgresql.enabled you may scale out.
replicaCount: 1

image:
  repository: ghcr.io/radicand/simple-books
  tag: "" # defaults to Chart.appVersion when empty
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: simple-books.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

persistence:
  enabled: true
  existingClaim: "" # use an existing PVC instead of creating one
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  mountPath: /app/data
  annotations: {}

# Recommended for production: durable Postgres instead of SQLite on a PVC (data loss risk on
# node loss, failed mounts, or accidental PVC deletion). Set postgresql.enabled or database.externalUrl.
#
# GitOps (Argo CD / Flux): REQUIRED — do not rely on empty auth.password (new password every sync).
# Use postgresql.auth.existingSecret (Bitnami Secret from first install, or External Secrets) or
# database.existingSecretName. See deploy/helm/simple-books/README.md.
postgresql:
  enabled: false
  auth:
    username: simplebooks
    # Empty only for helm upgrade with cluster API (lookup reuses Secret). Not for GitOps.
    password: ""
    # Pin an existing Secret (e.g. {release-name}-postgresql after first Bitnami install, or ESO):
    # existingSecret: ""
    # secretKeys:
    #   userPasswordKey: password
    database: simplebooks
  primary:
    persistence:
      enabled: true
      size: 8Gi

# External/managed Postgres (RDS, Cloud SQL, etc.). Takes precedence over postgresql.enabled.
database:
  externalUrl: ""
  # Full postgresql:// URL in an existing Secret (preferred over externalUrl in production).
  existingSecretName: ""
  existingSecretKey: DATABASE_URL

# Non-secret environment variables (see secretEnv for sensitive values).
env:
  NODE_ENV: production
  PORT: "3000"
  DATABASE_URL: /app/data/simple-books.db
  UPLOAD_MAX_BYTES: "10485760"

# Keys map to env var names; values are chart-managed Secret data (use externalSecret in prod).
secretEnv:
  BETTER_AUTH_SECRET: ""
  BETTER_AUTH_URL: ""
  OIDC_ISSUER_URL: ""
  OIDC_CLIENT_ID: ""
  OIDC_CLIENT_SECRET: ""
  OIDC_REDIRECT_URI: ""
  OIDC_DISPLAY_NAME: Single Sign-On
  S3_ENDPOINT: ""
  S3_REGION: garage
  S3_BUCKET: simple-books
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""

# When set, env and secretEnv are not rendered; use with External Secrets Operator.
existingSecretName: ""

nodeSelector: {}
tolerations: []
affinity: {}
